<!--
  Nutribox · Thank-you page · Referral Link Card Embed
  ====================================================
  INSTALL:
  Webflow Designer → giveaway thank-you page
    (https://www.nutribox.rs/giveaway/maj-2026-uspesna-prijava)
  → dodaj Embed element gde želiš da bude kartica → paste sve odavde → Publish.

  ⚠️  Pre publish-a, zameni `nutribox-giveaway-referral.vercel.app` u CONFIG.apiUrl i CONFIG.dashboardBaseUrl
  sa Vercel deploy URL-om (npr. nutribox-giveaway-referral.vercel.app).

  Renderuje zelenu karticu sa "Tvoj lični link", read-only input poljem,
  "Kopiraj" dugmetom i prečicama za WhatsApp/Viber/SMS.
-->

<style>
  .nb-ref-embed {
    font-family: 'Instrument Sans', system-ui, -apple-system, sans-serif;
    font-weight: 500;
    max-width: 600px;
    margin: 0 auto;
    color: #2a3540;
  }
  .nb-ref-embed * { box-sizing: border-box; }

  .nb-ref-card {
    background: #ffffff;
    border: 1px solid #e6e8ec;
    border-radius: 10px 3px;
    padding: 28px 26px;
    box-shadow: 0 2px 8px -4px rgba(16,26,36,0.06);
  }

  .nb-ref-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #317039;
    margin-bottom: 12px;
  }

  .nb-ref-title {
    font-size: 22px;
    font-weight: 600;
    color: #101a24;
    letter-spacing: -0.01em;
    line-height: 1.25;
    margin: 0 0 18px;
  }

  .nb-ref-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
    margin-bottom: 14px;
  }

  .nb-ref-input {
    flex: 1;
    background: #fafaf7;
    border: 1.5px solid #e6e8ec;
    color: #101a24;
    font-family: 'Instrument Sans', Menlo, monospace;
    font-weight: 500;
    font-size: 14px;
    padding: 13px 14px;
    border-radius: 10px 3px;
    outline: none;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .nb-ref-input:focus { border-color: #317039; }

  .nb-ref-btn {
    background: #317039;
    color: #ffffff;
    border: none;
    padding: 13px 22px;
    border-radius: 10px 3px;
    font-family: inherit;
    font-size: 14.5px;
    font-weight: 600;
    letter-spacing: -0.005em;
    cursor: pointer;
    transition: background-color 0.15s, transform 0.1s;
    white-space: nowrap;
    box-shadow: 0 6px 18px -8px rgba(49,112,57,0.5);
  }
  .nb-ref-btn:hover { background: #388041; transform: translateY(-1px); }
  .nb-ref-btn:active { transform: translateY(0); }
  .nb-ref-btn.nb-ref-copied { background: #285c2f; }

  .nb-ref-share {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .nb-ref-share-btn {
    flex: 1 1 0;
    min-width: 110px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    background: transparent;
    color: #2a3540;
    border: 1.5px solid #e6e8ec;
    padding: 11px 14px;
    border-radius: 10px 3px;
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.15s;
  }
  .nb-ref-share-btn:hover {
    border-color: #317039;
    color: #317039;
    transform: translateY(-1px);
  }
  .nb-ref-share-btn svg { width: 16px; height: 16px; flex: 0 0 16px; }

  .nb-ref-footnote {
    color: #5f6b75;
    font-size: 13px;
    line-height: 1.55;
    margin: 0;
  }
  .nb-ref-footnote a {
    color: #317039;
    font-weight: 600;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .nb-ref-footnote a:hover { color: #388041; }

  .nb-ref-status {
    color: #5f6b75;
    font-size: 15px;
    line-height: 1.55;
    text-align: center;
    padding: 14px 0;
  }
  .nb-ref-status strong { color: #101a24; }

  .nb-ref-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #101a24;
    color: #ffffff;
    padding: 13px 22px;
    border-radius: 10px 3px;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    box-shadow: 0 10px 30px rgba(16, 26, 36, 0.3);
    z-index: 9999;
  }
  .nb-ref-toast.nb-ref-show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 520px) {
    .nb-ref-row { flex-direction: column; }
    .nb-ref-btn { padding: 14px 18px; }
    .nb-ref-share-btn { flex: 1 1 calc(50% - 8px); min-width: 0; }
  }
</style>

<div class="nb-ref-embed" id="nb-ref-embed">
  <div class="nb-ref-card">
    <div class="nb-ref-status">Pripremamo tvoj lični link…</div>
  </div>
</div>
<div class="nb-ref-toast" id="nb-ref-toast">Link kopiran ✓</div>

<script>
(function () {
  var CONFIG = {
    // TODO: Zameni sa Vercel deploy URL-om kad Vuksan deploy-uje:
    apiUrl: 'https://nutribox-giveaway-referral.vercel.app/api/signup',
    webinarUrl: 'https://www.nutribox.rs/giveaway/maj-2026',
    dashboardBaseUrl: 'https://nutribox-giveaway-referral.vercel.app'
    // tagId nije postavljen — Nutribox je giveaway-only (bez Kit/ConvertKit integracije)
  };

  var SHARE_MSG = function (url) {
    return 'Prijavi se za Nutribox giveaway i osvoji 28-dnevni plan zdrave ishrane: ' + url;
  };

  var root = document.getElementById('nb-ref-embed');
  var params = new URLSearchParams(window.location.search);

  var isDemo = params.get('demo') === '1';
  if (isDemo) {
    setTimeout(function () {
      renderCard({
        firstName: 'Marko',
        shareUrl: CONFIG.webinarUrl + '?r=X7K2M9',
        dashboardUrl: CONFIG.dashboardBaseUrl + '/?t=demo-token'
      });
    }, 200);
    return;
  }

  // Data flow: forma.html stashed contact info to sessionStorage as 'nb_signup'.
  // Fallback order: URL params → sessionStorage → localStorage (ref only).
  var stashed = readStashedSignup();
  var email = getParam(['email', 'Email']) || stashed.email;
  var name  = getParam(['name', 'Name'])   || stashed.name;
  var ref   = getParam(['ref', 'Ref'])     || stashed.ref || getStoredRef();

  if (!email) {
    renderStatus('Nismo pročitali tvoju prijavu. <strong>Proveri email</strong> — lični link ti šaljemo tamo.');
    return;
  }

  try { localStorage.setItem('nb_ref_email', email); } catch (e) {}

  fetch(CONFIG.apiUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      email: email, name: name, ref: ref,
      webinarUrl: CONFIG.webinarUrl
      // tagId omitted = giveaway-only mode on the API
    })
  })
  .then(function (res) {
    if (!res.ok) throw new Error('status ' + res.status);
    return res.json();
  })
  .then(renderCard)
  .catch(function (err) {
    console.error('[nb-ref] signup failed', err);
    renderStatus('Problem pri generisanju linka. <strong>Proveri email</strong> — stiže ti tamo za par minuta.');
  });

  function renderCard(data) {
    var greeting = data.firstName ? esc(data.firstName) + ', ' : '';
    var shareUrl = esc(data.shareUrl);
    var dashboardUrl = esc(data.dashboardUrl);
    var msgEnc = encodeURIComponent(SHARE_MSG(data.shareUrl));

    root.innerHTML =
      '<div class="nb-ref-card">' +
        '<div class="nb-ref-label">Tvoj lični link</div>' +
        '<h3 class="nb-ref-title">' + greeting + 'pozovi prijatelje i dupliraj svoju šansu da osvojiš.</h3>' +
        '<div class="nb-ref-row">' +
          '<input class="nb-ref-input" id="nb-ref-input" value="' + shareUrl + '" readonly />' +
          '<button class="nb-ref-btn" id="nb-ref-btn" type="button">Kopiraj</button>' +
        '</div>' +
        '<div class="nb-ref-share">' +
          '<a class="nb-ref-share-btn" href="https://wa.me/?text=' + msgEnc + '" target="_blank" rel="noopener">' +
            '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.2-1.8-.9-2.1-1-.3-.1-.5-.2-.7.2-.2.3-.8 1-1 1.2-.2.2-.4.2-.7 0-.3-.2-1.3-.5-2.4-1.5-.9-.8-1.5-1.8-1.7-2.1-.2-.3 0-.5.1-.7.1-.1.3-.4.4-.5.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5 0-.2-.7-1.6-.9-2.2-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.4 0 1.4 1.1 2.8 1.2 3 .2.2 2.1 3.3 5.1 4.6 1.8.7 2.5.8 3.3.7.5-.1 1.6-.7 1.8-1.3.2-.6.2-1.2.2-1.3-.1-.1-.3-.2-.6-.3zM12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.5 1.3 5L2 22l5.1-1.3c1.4.8 3.1 1.3 4.9 1.3 5.5 0 10-4.5 10-10S17.5 2 12 2z"/></svg>' +
            'WhatsApp</a>' +
          '<a class="nb-ref-share-btn" href="viber://forward?text=' + msgEnc + '" rel="noopener">' +
            '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.4 0H12.6c1.5 0 6.3.2 9 2.7 1.6 1.5 2.2 3.8 2.3 6.6.1 2.8.2 8-4.7 9.8h-.1l.1 2.9-3.5-2c-3.6.1-7.3.3-9.5-2-1-1.1-1.7-2.4-2-3.9C4 12.2 3.9 9.7 4.1 7.4 4.4 5.1 5 3.1 6.6 1.7 9 .2 11.4 0 11.4 0zm6.3 8.4c-.2-.4-.6-.6-1-.6-1 0-1.4 1.3-1.6 1.7-.2.4-.3.4-.7.2-1-.6-2-1.5-2.7-2.6-.2-.4-.2-.5.1-.8.4-.4 1.2-1.1.8-1.9-.3-.8-.6-1.5-1.1-2.2-.4-.7-1.1-.5-1.7-.2-1.1.6-1.7 1.7-1.6 2.9 0 .3.1.6.2.9.4 1.2 1 2.3 1.7 3.3.7 1 1.4 1.9 2.3 2.7.9.8 1.9 1.4 3.1 1.8.6.2 1.3.4 2 .3 1.3-.1 2.4-1.2 2.5-2.4 0-.1 0-.2-.1-.3-.2-.4-2.1-1.3-2.2-.8z"/></svg>' +
            'Viber</a>' +
          '<a class="nb-ref-share-btn" href="sms:?body=' + msgEnc + '" rel="noopener">' +
            '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM7 9h10v2H7V9zm10 5H7v-2h10v2zm0-6H7V6h10v2z"/></svg>' +
            'SMS</a>' +
        '</div>' +
        '<p class="nb-ref-footnote">' +
          'Prati broj prijavljenih preko svog linka na <a href="' + dashboardUrl + '" target="_blank" rel="noopener">svojoj platformi</a>.' +
        '</p>' +
      '</div>';
    document.getElementById('nb-ref-btn').addEventListener('click', onCopy);
    document.getElementById('nb-ref-input').addEventListener('click', function (e) { e.target.select(); });
  }

  function renderStatus(html) {
    root.innerHTML = '<div class="nb-ref-card"><div class="nb-ref-status">' + html + '</div></div>';
  }

  function onCopy() {
    var btn = document.getElementById('nb-ref-btn');
    var input = document.getElementById('nb-ref-input');
    var done = function () {
      btn.textContent = 'Kopirano ✓';
      btn.classList.add('nb-ref-copied');
      showToast();
      setTimeout(function () {
        btn.textContent = 'Kopiraj';
        btn.classList.remove('nb-ref-copied');
      }, 2000);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(input.value).then(done, fallback);
    } else {
      fallback();
    }
    function fallback() {
      input.select();
      try { document.execCommand('copy'); } catch (e) {}
      done();
    }
  }

  function showToast() {
    var t = document.getElementById('nb-ref-toast');
    t.classList.add('nb-ref-show');
    setTimeout(function () { t.classList.remove('nb-ref-show'); }, 1800);
  }

  function getParam(keys) {
    for (var i = 0; i < keys.length; i++) {
      var v = params.get(keys[i]);
      if (v && v.trim()) return v.trim();
    }
    return '';
  }

  function getStoredRef() {
    try { return localStorage.getItem('nb_ref') || ''; } catch (e) { return ''; }
  }

  function readStashedSignup() {
    try {
      var raw = sessionStorage.getItem('nb_signup');
      if (!raw) return {};
      var obj = JSON.parse(raw);
      return {
        email: (obj && obj.email) || '',
        name:  (obj && obj.name)  || '',
        ref:   (obj && obj.ref)   || ''
      };
    } catch (e) { return {}; }
  }

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
})();
</script>
