<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Moj referral · Nutribox — Giveaway maj 2026</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap">

<style>
  :root {
    --primary: #317039;
    --primary-hover: #388041;
    --primary-soft: #e8f1e9;
    --accent: #e89a3c;
    --accent-deep: #d23b3b;
    --dark: #101a24;
    --text: #2a3540;
    --text-soft: #5f6b75;
    --line: #e6e8ec;
    --line-strong: #d8dad6;
    --bg: #fafaf7;
    --white: #ffffff;
    --shadow-card: 0 2px 8px -4px rgba(16,26,36,0.06);
    --shadow-cta: 0 8px 22px -10px rgba(49,112,57,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Instrument Sans', system-ui, -apple-system, sans-serif;
    font-weight: 400;
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 48px 20px 80px;
  }

  .brand {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    letter-spacing: 0.04em;
    color: var(--text-soft);
    font-weight: 600;
    margin-bottom: 32px;
  }
  .brand-dot {
    width: 10px;
    height: 10px;
    border-radius: 10px 3px;
    background: var(--primary);
    display: inline-block;
  }
  .brand strong { color: var(--dark); font-weight: 700; }

  .hero { margin-bottom: 32px; }
  .hero h1 {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1.1;
    color: var(--dark);
  }
  .hero p {
    margin-top: 12px;
    color: var(--text-soft);
    font-size: 16px;
    line-height: 1.55;
    max-width: 540px;
  }

  .card {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 10px 3px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-card);
  }

  .card-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--primary);
    margin-bottom: 14px;
  }

  /* Progress card */
  .progress-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .progress-num .count {
    font-size: 64px;
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--dark);
  }
  .progress-rank {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 10px 3px;
    padding: 12px 18px;
    text-align: center;
  }
  .progress-rank .rank-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-soft);
    margin-bottom: 2px;
  }
  .progress-rank .rank-big {
    font-size: 28px;
    font-weight: 700;
    color: var(--dark);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .progress-caption {
    color: var(--text-soft);
    font-size: 14px;
    margin-top: 12px;
  }

  /* Share link */
  .share-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }
  .share-input {
    flex: 1;
    background: var(--bg);
    border: 1.5px solid var(--line);
    color: var(--dark);
    font-family: 'Instrument Sans', Menlo, monospace;
    font-weight: 500;
    font-size: 14px;
    padding: 13px 14px;
    border-radius: 10px 3px;
    outline: none;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .share-input:focus { border-color: var(--primary); }

  .copy-btn {
    background: var(--primary);
    color: #ffffff;
    border: none;
    padding: 13px 22px;
    border-radius: 10px 3px;
    font-family: inherit;
    font-size: 14.5px;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.15s, transform 0.1s;
    white-space: nowrap;
    box-shadow: var(--shadow-cta);
  }
  .copy-btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
  .copy-btn:active { transform: translateY(0); }
  .copy-btn.copied { background: #285c2f; }

  /* Referrals list */
  .ref-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .ref-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 10px 3px;
    padding: 12px 14px;
  }
  .ref-item-main { min-width: 0; flex: 1; }
  .ref-name {
    font-size: 14.5px;
    font-weight: 600;
    color: var(--dark);
    letter-spacing: -0.005em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .ref-email {
    font-size: 12.5px;
    color: var(--text-soft);
    margin-top: 1px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .ref-time {
    font-size: 12px;
    color: var(--text-soft);
    flex: 0 0 auto;
    white-space: nowrap;
  }
  .empty {
    color: var(--text-soft);
    font-size: 14.5px;
    line-height: 1.55;
    padding: 6px 0 2px;
  }

  /* Leaderboard */
  .lb-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .lb-item {
    display: grid;
    grid-template-columns: 36px 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 10px 3px;
  }
  .lb-item.me {
    background: var(--primary-soft);
    border-color: var(--primary);
  }
  .lb-item.top-3 .lb-rank { background: var(--accent); color: #fff; }
  .lb-rank {
    width: 30px;
    height: 30px;
    border-radius: 999px;
    background: var(--line-strong);
    color: var(--dark);
    font-weight: 700;
    font-size: 13px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .lb-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--dark);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .lb-email {
    font-size: 12px;
    color: var(--text-soft);
    margin-top: 1px;
  }
  .lb-count {
    font-size: 18px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: -0.01em;
  }
  .lb-count-label {
    font-size: 12px;
    color: var(--text-soft);
    margin-left: 4px;
  }
  .lb-foot {
    margin-top: 14px;
    font-size: 13px;
    color: var(--text-soft);
    line-height: 1.55;
  }
  .lb-foot .highlight {
    color: var(--primary);
    font-weight: 700;
  }

  /* Error state */
  .error-box {
    background: var(--white);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent-deep);
    border-radius: 10px 3px;
    padding: 22px;
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--dark);
    color: #ffffff;
    padding: 13px 22px;
    border-radius: 10px 3px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    box-shadow: 0 10px 30px rgba(16,26,36,0.3);
    z-index: 9999;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 520px) {
    .hero h1 { font-size: 28px; }
    .progress-num .count { font-size: 52px; }
    .share-row { flex-direction: column; }
    .lb-item { grid-template-columns: 32px 1fr auto; gap: 10px; padding: 10px 12px; }
  }
</style>

</head>
<body>

<main id="app">
  <div class="hero">
    <h1>Učitavamo…</h1>
    <p>Trenutak.</p>
  </div>
</main>

<div class="toast" id="toast">Link kopiran ✓</div>

<script>
  const SUPABASE_URL = 'https://tpypxlgcndfcqbegukfd.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRweXB4bGdjbmRmY3FiZWd1a2ZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MTYzNzcsImV4cCI6MjA5NTE5MjM3N30._HemNaGZzQtOnAOGYaGIpuF0XhpPH5DAy6juxUmT19E';
  const WEBINAR_LANDING_URL = 'https://www.nutribox.rs/giveaway/maj-2026';

  const params = new URLSearchParams(location.search);
  const token = params.get('t');
  const app = document.getElementById('app');
  const isDemoMode = params.get('demo') === '1';

  if (isDemoMode) {
    render(demoData(), demoLeaderboard());
  } else if (!token) {
    renderError('Link nije ispravan. Proveri mail koji si dobio posle prijave.');
  } else {
    loadAll(token);
  }

  function demoData() {
    const now = Date.now();
    return {
      ref_code: 'X7K2M9',
      first_name: 'Marko',
      last_name: 'Marković',
      referral_count: 3,
      my_rank: 4,
      total_with_referrals: 18,
      referrals: [
        { email: 'ana.petrovic@gmail.com', first_name: 'Ana', last_name: 'Petrović', created_at: new Date(now - 45*60*1000).toISOString() },
        { email: 'stefan@outlook.com', first_name: 'Stefan', last_name: 'Jovanović', created_at: new Date(now - 3*3600*1000).toISOString() },
        { email: 'milica.jovanovic@yahoo.com', first_name: 'Milica', last_name: 'Ilić', created_at: new Date(now - 26*3600*1000).toISOString() }
      ]
    };
  }
  function demoLeaderboard() {
    return [
      { rank: 1, first_name: 'Jovana', last_name: 'Stanković', email: 'j***@example.com', referral_count: 12, is_me: false },
      { rank: 2, first_name: 'Nikola', last_name: 'Petrović', email: 'n***@example.com', referral_count: 9, is_me: false },
      { rank: 3, first_name: 'Ivana', last_name: 'Đorđević', email: 'i***@example.com', referral_count: 7, is_me: false },
      { rank: 4, first_name: 'Marko', last_name: 'Marković', email: 'marko@example.com', referral_count: 3, is_me: true },
      { rank: 5, first_name: 'Petar', last_name: 'Nikolić', email: 'p***@example.com', referral_count: 2, is_me: false }
    ];
  }

  async function loadAll(t) {
    try {
      const [me, board] = await Promise.all([
        rpc('get_dashboard', { p_token: t }),
        rpc('get_leaderboard', { p_token: t })
      ]);
      const meRow = Array.isArray(me) ? me[0] : me;
      if (!meRow) {
        renderError('Nismo pronašli tvoj dashboard. Proveri link.');
        return;
      }
      render(meRow, Array.isArray(board) ? board : []);
    } catch (err) {
      console.error(err);
      renderError('Trenutno ne možemo da učitamo podatke. Probaj ponovo za minut.');
    }
  }

  async function rpc(fn, body) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`
      },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(`${fn} ${res.status}`);
    return res.json();
  }

  function render(data, board) {
    const count = Number(data.referral_count || 0);
    const firstName = data.first_name || '';
    const refCode = data.ref_code;
    const shareUrl = `${WEBINAR_LANDING_URL}?r=${refCode}`;
    const referrals = Array.isArray(data.referrals) ? data.referrals : [];
    const myRank = data.my_rank;

    const greeting = firstName ? `Pozdrav, ${escapeHtml(firstName)}!` : 'Pozdrav!';
    const subtitle = count === 0
      ? 'Pozovi prijatelje. Ako neko ko se prijavi preko tvog linka bude izvučen, pobeđuješ i ti.'
      : `Već si pozvao/la ${count} ${plural(count)}. Što više ljudi, veće su tvoje šanse u izvlačenju.`;

    const leaderboardBlock = renderLeaderboard(board, refCode, myRank, count);

    app.innerHTML = `
      <div class="hero">
        <h1>${greeting}</h1>
        <p>${subtitle}</p>
      </div>

      <div class="card">
        <div class="card-label">Tvoji referali</div>
        <div class="progress-row">
          <div class="progress-num">
            <span class="count">${count}</span>
          </div>
        </div>
        <div class="progress-caption">prijavljenih preko tvog linka</div>
      </div>

      <div class="card">
        <div class="card-label">Tvoj lični link</div>
        <div class="share-row">
          <input class="share-input" id="shareInput" value="${escapeHtml(shareUrl)}" readonly />
          <button class="copy-btn" id="copyBtn" type="button">Kopiraj</button>
        </div>
      </div>

      <div class="card">
        <div class="card-label">Ljudi koje si doveo (${count})</div>
        ${referrals.length === 0
          ? `<div class="empty">Još niko. Podeli link iznad — potreban ti je samo klik na "Kopiraj".</div>`
          : `<ul class="ref-list">${referrals.map(renderRefItem).join('')}</ul>`}
      </div>

      ${leaderboardBlock}
    `;

    document.getElementById('copyBtn').addEventListener('click', onCopy);
    document.getElementById('shareInput').addEventListener('click', (e) => e.target.select());
  }

  function renderLeaderboard(board, myRefCode, myRank, myCount) {
    if (!board || board.length === 0) return '';

    const rows = board.map((r) => {
      const isMe = r.is_me === true;
      const top3 = r.rank <= 3;
      const name = [r.first_name, r.last_name].filter(Boolean).join(' ') || '—';
      return `
        <li class="lb-item ${isMe ? 'me' : ''} ${top3 ? 'top-3' : ''}">
          <div class="lb-rank">${r.rank}</div>
          <div>
            <div class="lb-name">${escapeHtml(name)}</div>
            <div class="lb-email">${escapeHtml(r.email || '')}</div>
          </div>
          <div>
            <span class="lb-count">${r.referral_count}</span><span class="lb-count-label">${plural(Number(r.referral_count))}</span>
          </div>
        </li>
      `;
    }).join('');

    const showMyPosition = myRank != null && myRank > board.length;
    const foot = showMyPosition
      ? `<div class="lb-foot">Ti si <span class="highlight">#${myRank}</span> sa ${myCount} ${plural(myCount)}. Vrati se na vrh — nije kasno.</div>`
      : '';

    return `
      <div class="card">
        <div class="card-label">Lestvica · Top ${board.length}</div>
        <ul class="lb-list">${rows}</ul>
        ${foot}
      </div>
    `;
  }

  function renderRefItem(r) {
    const full = [r.first_name, r.last_name].filter(Boolean).join(' ') || '—';
    return `
      <li class="ref-item">
        <div class="ref-item-main">
          <div class="ref-name">${escapeHtml(full)}</div>
          <div class="ref-email">${escapeHtml(r.email || '')}</div>
        </div>
        <div class="ref-time">${formatTime(r.created_at)}</div>
      </li>
    `;
  }

  async function onCopy() {
    const btn = document.getElementById('copyBtn');
    const input = document.getElementById('shareInput');
    try {
      await navigator.clipboard.writeText(input.value);
    } catch {
      input.select();
      try { document.execCommand('copy'); } catch (e) {}
    }
    btn.textContent = 'Kopirano ✓';
    btn.classList.add('copied');
    showToast();
    setTimeout(() => {
      btn.textContent = 'Kopiraj';
      btn.classList.remove('copied');
    }, 2000);
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  function renderError(msg) {
    app.innerHTML = `<div class="error-box">${escapeHtml(msg)}</div>`;
  }

  function plural(n) {
    const mod10 = n % 10;
    const mod100 = n % 100;
    if (mod10 === 1 && mod100 !== 11) return 'prijavu';
    if ([2,3,4].includes(mod10) && ![12,13,14].includes(mod100)) return 'prijave';
    return 'prijava';
  }

  function formatTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 60) return 'upravo sad';
    if (diff < 3600) return `pre ${Math.floor(diff / 60)} min`;
    if (diff < 86400) return `pre ${Math.floor(diff / 3600)} h`;
    const days = Math.floor(diff / 86400);
    if (days < 7) return `pre ${days} ${days === 1 ? 'dan' : 'dana'}`;
    return d.toLocaleDateString('sr-Latn-RS', { day: 'numeric', month: 'short' });
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  }
</script>

</body>
</html>
